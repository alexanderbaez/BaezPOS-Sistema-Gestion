<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaezPOS - Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --sidebar-width: 250px; --primary-color: #1e3a8a; --primary-blue: #0d6efd; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* Contenedor principal alineado al sidebar dinámico */
        #content { margin-left: var(--sidebar-width); min-height: 100vh; padding: 2rem; transition: all 0.3s; }

        .card-main { background: white; border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        /* Comportamiento responsivo unificado para el sidebar dinámico */
        @media (max-width: 768px) {
            #sidebar { left: calc(var(--sidebar-width) * -1) !important; }
            #content { margin-left: 0; width: 100%; }
            #sidebar.active { left: 0 !important; }
        }

        .nav-link.active-page { background-color: var(--primary-blue) !important; font-weight: bold; color: white !important; }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div id="content">
    <button type="button" id="sidebarCollapse" class="btn btn-outline-primary d-md-none mb-3"><i class="bi bi-list"></i></button>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold m-0 text-dark">Gestión de Empleados</h2>
            <p class="text-muted small mb-0">Administra los accesos al sistema</p>
        </div>
        <button class="btn btn-primary shadow-sm rounded-3 fw-bold" data-bs-toggle="modal" data-bs-target="#modalEmpleado">
            <i class="bi bi-person-plus-fill me-2"></i> Nuevo Empleado
        </button>
    </div>

    <div class="card card-main overflow-hidden">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Nombre / Alias</th>
                        <th>Email de Ingreso</th>
                        <th>Rol del Sistema</th>
                        <th class="text-end pe-4">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaEmpleados">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEmpleado" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 15px;">
            <div class="modal-header bg-light border-0">
                <h5 class="modal-title fw-bold text-dark"><i class="bi bi-person-badge me-2 text-primary"></i> Datos del Empleado</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formEmpleado">
                    <input type="hidden" id="empleadoId">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">Nombre Completo</label>
                        <input type="text" class="form-control" id="empNombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">Correo (Usuario de Acceso)</label>
                        <input type="email" class="form-control" id="empEmail" required>
                    </div>
                    <div class="mb-3" id="passwordContainer">
                        <label class="form-label fw-bold small text-muted">Contraseña</label>
                        <input type="password" class="form-control" id="empPassword">
                        <small class="text-muted" style="font-size: 0.8rem;">Deja en blanco para no cambiarla (si estás editando).</small>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">Rol Operativo</label>
                        <select class="form-select" id="empRol" required>
                            <option value="VENDEDOR">Vendedor (Ventas y Clientes)</option>
                            <option value="ADMIN">Administrador (Control Total)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 p-2 fw-bold rounded-3">Guardar Empleado</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="sidebar.js"></script>

<script src="auth.js"></script>
<script src="empleados.js"></script>
</body>
</html>
