<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaezPOS - Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --sidebar-width: 250px; --primary-color: #1e3a8a; --primary-blue: #0d6efd; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* Contenedor alineado con el sidebar dinámico */
        #content { margin-left: var(--sidebar-width); min-height: 100vh; transition: all 0.3s; }

        .card-pos { height: calc(100vh - 100px); border: none; border-radius: 15px; }
        .total-display { font-size: 3.5rem; font-weight: 900; color: var(--primary-color); line-height: 1; }
        .table-responsive { height: 400px; overflow-y: auto; }

        .metodo-pago { cursor: pointer; border: 2px solid #e2e8f0; border-radius: 10px; transition: 0.2s; padding: 10px; text-align: center; }
        .metodo-pago.active { border-color: var(--primary-blue); background: #eff6ff; color: var(--primary-blue); font-weight: bold; }
        .metodo-pago i { font-size: 1.5rem; }

        .sugerencias-box { z-index: 1050; display: none; max-height: 250px; overflow-y: auto; border-radius: 10px; }

        .pulse-icon { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        #alertaSuscripcion .alert { border-radius: 0; border-bottom: 2px solid #f59e0b; }

        /* Comportamiento responsivo unificado para el sidebar dinámico */
        @media (max-width: 768px) {
            #sidebar { left: calc(var(--sidebar-width) * -1) !important; }
            #content { margin-left: 0; width: 100%; }
            #sidebar.active { left: 0 !important; }
        }

        .nav-link.active-page { background-color: var(--primary-blue) !important; font-weight: bold; color: white !important; }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div id="content">
    <div id="alertaSuscripcion" class="container-fluid d-none px-0" style="position: sticky; top: 0; z-index: 1060;">
        <div class="alert alert-warning border-0 shadow-sm d-flex justify-content-between align-items-center m-0 py-3">
            <div class="ms-3">
                <i class="bi bi-exclamation-triangle-fill me-2 pulse-icon text-danger"></i>
                <span class="fw-bold">AVISO DE VENCIMIENTO:</span> Tu suscripción vence en <span id="diasFaltantes" class="badge bg-danger fs-6">X</span> días.
            </div>
            <a id="btnPagarWhatsApp" href="#" target="_blank" class="btn btn-dark btn-sm fw-bold me-3 shadow-sm px-4">
                <i class="bi bi-whatsapp me-2 text-success"></i> PAGAR AHORA
            </a>
        </div>
    </div>

    <div class="container-fluid p-4">
        <div class="row g-4">
            <div class="col-md-8">
                <div class="card card-pos shadow-sm p-3">
                    <div class="mb-3 position-relative">
                        <form id="formBusqueda" onsubmit="event.preventDefault(); buscarYAgregar(document.getElementById('buscadorVenta').value);">
                            <div class="input-group input-group-lg shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-upc-scan text-primary"></i></span>
                                <input type="text" id="buscadorVenta" class="form-control border-start-0" placeholder="Escanea o escribe para buscar..." autofocus autocomplete="off">
                            </div>
                        </form>
                        <div id="listaSugerencias" class="list-group position-absolute w-100 shadow-lg sugerencias-box"></div>
                    </div>

                    <button class="btn btn-warning w-100 mb-3 fw-bold" onclick="agregarProductoManual()">
                        <i class="bi bi-plus-circle me-2"></i> CARGA MANUAL (PAN, VARIOS)
                    </button>

                    <div class="table-responsive">
                        <table class="table align-middle table-hover">
                            <thead class="text-muted small border-bottom">
                            <tr>
                                <th>PRODUCTO</th>
                                <th class="text-center">CANTIDAD</th>
                                <th class="text-end">PRECIO</th>
                                <th class="text-end">SUBTOTAL</th>
                                <th class="text-end"></th>
                            </tr>
                            </thead>
                            <tbody id="carritoBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-pos shadow-sm p-4 d-flex flex-column justify-content-between">
                    <div>
                        <h6 class="text-muted mb-1 text-uppercase fw-bold small">Total Final</h6>
                        <div class="total-display mb-3" id="totalVenta">$0.00</div>

                        <div class="bg-light p-2 rounded-3 border mb-3">
                            <label class="small fw-bold text-muted text-uppercase mb-1 d-block" style="font-size: 0.7rem;">Aplicar Descuento</label>
                            <div class="row g-1">
                                <div class="col-7">
                                    <input type="number" id="inputDescuento" class="form-control form-control-sm fw-bold" placeholder="Monto o %" oninput="renderizarCarrito()">
                                </div>
                                <div class="col-5">
                                    <select id="tipoDescuento" class="form-select form-select-sm" onchange="renderizarCarrito()">
                                        <option value="PESOS">$ Pesos</option>
                                        <option value="PORCENTAJE">% Porc.</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <label class="small fw-bold mb-2 text-muted text-uppercase">Método de Pago</label>
                        <div class="row g-2 mb-3">
                            <div class="col-4">
                                <div id="btnEfectivo" class="metodo-pago active" onclick="setMetodo('EFECTIVO', this)">
                                    <i class="bi bi-cash"></i><br><small>Efectivo</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div id="btnTransf" class="metodo-pago" onclick="setMetodo('TRANSFERENCIA', this)">
                                    <i class="bi bi-phone"></i><br><small>Transf/QR</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div id="btnFiado" class="metodo-pago" onclick="setMetodo('CUENTA_CORRIENTE', this)">
                                    <i class="bi bi-journal-bookmark"></i><br><small>Libreta</small>
                                </div>
                            </div>
                        </div>

                        <div id="seccionClienteFiado" class="mb-3 d-none">
                            <div class="bg-warning bg-opacity-10 p-3 rounded-3 border border-warning shadow-sm">
                                <label class="small fw-bold text-warning text-uppercase mb-2 text-center d-block">Seleccionar Cliente</label>
                                <div class="position-relative">
                                    <input type="text" id="buscarClientePos" class="form-control form-control-sm border-warning" placeholder="Nombre del cliente...">
                                    <div id="sugerenciasClientes" class="list-group position-absolute w-100 shadow-lg sugerencias-box"></div>
                                </div>
                                <div id="infoClienteSeleccionado" class="mt-2 d-none">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="badge bg-warning text-dark px-2 py-2" id="nombreClientePos"></span>
                                        <span class="small fw-bold">Debe: <span id="saldoClientePos" class="text-danger"></span></span>
                                    </div>
                                    <input type="hidden" id="idClienteSeleccionado">
                                </div>
                            </div>
                        </div>

                        <div id="seccionVuelto" class="bg-light p-3 rounded-3 border mb-3 shadow-sm">
                            <div class="mb-2">
                                <label class="small fw-bold text-muted text-uppercase">Paga con:</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted">$</span>
                                    <input type="number" id="pagaCon" class="form-control form-control-lg fw-bold border-start-0" placeholder="0.00">
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <span class="fw-bold text-muted small">VUELTO:</span>
                                <span class="h3 mb-0 fw-bold text-success" id="vueltoVenta">$0.00</span>
                            </div>
                            <button type="button" class="btn btn-outline-secondary btn-sm mt-2" onclick="reimprimirUltimoTicket()">
                                <i class="bi bi-printer"></i> Reimprimir Último Ticket
                            </button>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <button class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-sm" onclick="finalizarVenta()">
                            <i class="bi bi-check2-all me-2"></i>CONFIRMAR VENTA
                        </button>
                        <button class="btn btn-outline-danger w-100 mt-2 border-0" onclick="cancelarVenta()">
                            Cancelar Venta
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalBloqueo" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-body text-center p-5">
                <i class="bi bi-shield-lock-fill text-danger mb-4" style="font-size: 5rem;"></i>
                <h2 class="fw-bold">SISTEMA SUSPENDIDO</h2>
                <p class="text-muted fs-5">Tu abono de <strong>BÁEZ POS</strong> ha vencido.</p>
                <a id="btnBloqueoWhatsApp" href="#" target="_blank" class="btn btn-success btn-lg w-100 py-3 fw-bold shadow">
                    <i class="bi bi-whatsapp me-2"></i> INFORMAR PAGO A ALEXANDER
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="sidebar.js"></script>

<script src="licencia-cliente.js"></script>
<script src="auth.js"></script>
<script src="ventas.js"></script>
</body>
</html>
