<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaezPOS | Acceso al Sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --primary-dark: #1e3a8a; --primary-light: #3b82f6; }
    body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top right, #3b82f6, #1e3a8a);
        height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
        border: none; border-radius: 24px; width: 100%; max-width: 420px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden;
    }
    .card-header-custom { padding: 40px 20px 10px; text-align: center; }
    .logo-text { font-weight: 800; font-style: italic; font-size: 2.5rem; color: var(--primary-dark); letter-spacing: -1px; }
    .form-label { font-weight: 600; color: #4b5563; font-size: 0.75rem; letter-spacing: 0.5px; }
    .input-group-text { background-color: #f3f4f6; border: 1px solid #e5e7eb; border-right: none; color: #9ca3af; border-radius: 12px 0 0 12px; }
    .form-control { background-color: #f3f4f6; border: 1px solid #e5e7eb; border-left: none; border-radius: 0 12px 12px 0; padding: 12px; font-size: 0.95rem; }
    .form-control:focus { background-color: #fff; box-shadow: none; border-color: var(--primary-light); }
    .btn-login {
        background: linear-gradient(to right, var(--primary-dark), var(--primary-light));
        border: none; border-radius: 12px; padding: 14px; font-weight: 600; color: white; margin-top: 10px;
        transition: transform 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); color: white; opacity: 0.9; }
    .text-id-display { font-family: monospace; font-size: 0.85rem; background: #eef2ff; color: #1e40af; border: 1px dashed #3b82f6; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="card-header-custom">
    <h1 class="logo-text">BaezPOS</h1>
    <p class="text-muted small text-uppercase" style="letter-spacing: 1px;">Gestión de Comercio</p>
  </div>

  <div class="card-body p-4 pt-0">
    <div id="messageContainer"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label text-uppercase">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="admin@correo.com" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-uppercase">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-login w-100 shadow-sm" id="btnIngresar">
        <span id="btnText">Ingresar al Sistema</span>
        <div class="spinner-border spinner-border-sm d-none" id="loader" role="status"></div>
      </button>

      <div class="text-center mt-3">
        <a href="#" class="text-decoration-none small text-muted fw-bold" onclick="abrirModalRecuperacion()">¿Olvidaste tu contraseña?</a>
      </div>
    </form>
  </div>

  <div class="bg-light p-3 text-center border-top">
    <span class="text-muted small">Powered by <strong>Alexander Baez</strong> &copy; 2026</span>
  </div>
</div>

<div class="modal fade" id="modalRecuperacion" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow" style="border-radius: 16px;">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold text-dark"><i class="bi bi-headset me-2"></i>Soporte de Recuperación</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-3">Para resetear su acceso, proporcione el siguiente Identificador de Equipo al desarrollador:</p>

        <div class="p-3 rounded-3 text-id-display text-center mb-4 position-relative">
          <span id="pcIdDisplay" class="fw-bold">CARGANDO ID...</span>
          <button class="btn btn-sm btn-link p-0 ms-2 text-decoration-none" onclick="copiarId()" title="Copiar ID">
            <i class="bi bi-copy"></i>
          </button>
        </div>

        <div class="mb-3">
          <label class="form-label text-uppercase">Llave de Desbloqueo</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-key"></i></span>
            <input type="text" id="llaveMaestraInput" class="form-control" placeholder="Ingrese el código de 6 dígitos" maxlength="6">
          </div>
        </div>

        <button type="button" class="btn btn-primary btn-login w-100 mt-2" onclick="validarLlaveOffline()" id="btnValidarLlave">
          Validar y Resetear Acceso
        </button>
      </div>
      <div class="modal-footer border-0 pt-0 justify-content-center">
        <p class="text-muted" style="font-size: 0.7rem;">BaezPOS Security System &bull; Modo Offline</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="login.js"></script>
</body>
</html>
