<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaezPOS | Acceso al Sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary-dark: #1e3a8a; --primary-light: #3b82f6; }
    body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top right, #3b82f6, #1e3a8a);
        height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
        border: none; border-radius: 24px; width: 100%; max-width: 420px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden;
    }
    .card-header-custom { padding: 40px 20px 10px; text-align: center; }
    .logo-text { font-weight: 800; font-style: italic; font-size: 2.5rem; color: var(--primary-dark); letter-spacing: -1px; }
    .form-label { font-weight: 600; color: #4b5563; font-size: 0.75rem; letter-spacing: 0.5px; }
    .input-group-text { background-color: #f3f4f6; border: 1px solid #e5e7eb; border-right: none; color: #9ca3af; border-radius: 12px 0 0 12px; }
    .form-control { background-color: #f3f4f6; border: 1px solid #e5e7eb; border-left: none; border-radius: 0 12px 12px 0; padding: 12px; font-size: 0.95rem; }
    .form-control:focus { background-color: #fff; box-shadow: none; border-color: var(--primary-light); }
    .btn-login {
        background: linear-gradient(to right, var(--primary-dark), var(--primary-light));
        border: none; border-radius: 12px; padding: 14px; font-weight: 600; color: white; margin-top: 10px;
        transition: transform 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); color: white; opacity: 0.9; }
    .custom-alert { border-radius: 12px; border: none; font-size: 0.9rem; font-weight: 500; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="card-header-custom">
    <h1 class="logo-text">BaezPOS</h1>
    <p class="text-muted small text-uppercase" style="letter-spacing: 1px;">Gestión Multi-tenant</p>
  </div>

  <div class="card-body p-4 pt-0">
    <div id="messageContainer"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label text-uppercase">Email Corporativo</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="admin@empresa.com" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-uppercase">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-login w-100 shadow-sm" id="btnIngresar">
        <span id="btnText">Ingresar al Sistema</span>
        <div class="spinner-border spinner-border-sm d-none" id="loader" role="status"></div>
      </button>
    </form>
  </div>

  <div class="bg-light p-3 text-center border-top">
    <span class="text-muted small">Powered by <strong>Alexander Baez</strong> &copy; 2026</span>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
