<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaezPOS - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        :root { --sidebar-width: 260px; --primary-color: #1e3a8a; }
        body { background-color: #f8f9fa; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; }
        #sidebar {
            width: var(--sidebar-width); height: 100vh; position: fixed;
            left: 0; top: 0; background-color: var(--primary-color);
            transition: all 0.3s; z-index: 1000;
        }
        #content {
            margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            transition: all 0.3s; min-height: 100vh;
        }
        .nav-link {
            color: rgba(255,255,255,0.7); padding: 12px 20px;
            border-radius: 8px; margin: 4px 12px; display: flex; align-items: center; text-decoration: none;
        }
        .nav-link:hover, .nav-link.active { color: white; background-color: rgba(255,255,255,0.1); }
        .nav-link i { margin-right: 12px; font-size: 1.2rem; }
        .cursor-pointer { cursor: pointer; }

        @media print { .no-print { display: none !important; } @page { size: 50mm 25mm; margin: 0; } }

        @media (max-width: 768px) {
            #sidebar { left: calc(var(--sidebar-width) * -1); }
            #content { margin-left: 0; width: 100%; }
            #sidebar.active { left: 0; }
        }

        .hover-menu:hover { background-color: rgba(255, 255, 255, 0.1); transition: 0.2s; }
        .nav-link.active-page { background-color: #0d6efd; font-weight: bold; color: white; }
    </style>
</head>
<body>

<nav id="sidebar" class="bg-dark vh-100 shadow">
    <div class="p-4 text-center">
        <h3 class="text-white fw-bold">BaezPOS</h3>
        <hr class="text-white">
    </div>
    <div class="nav flex-column px-3 gap-1">
        <a href="dashboard.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>
        <a href="productos.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-box-seam me-2"></i> Productos
        </a>
        <a href="ventas.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-cart me-2"></i> Punto de Venta
        </a>
        <a href="clientes.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-people me-2"></i> Clientes (Libreta)
        </a>
        <a href="perfil.html" class="nav-link text-white rounded p-2 active">
            <i class="bi bi-shop me-2"></i> Mi Negocio
        </a>
        <a href="#" class="nav-link text-danger mt-5 p-2" onclick="cerrarSesion()">
            <i class="bi bi-box-arrow-left me-2"></i> Salir
        </a>
    </div>
</nav>

<div id="content">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm p-3">
        <div class="container-fluid">
            <button type="button" id="sidebarCollapse" class="btn btn-outline-primary d-md-none"><i class="bi bi-list"></i></button>
            <div class="ms-auto d-flex align-items-center">
                <div class="text-end me-3">
                    <div id="userName" class="fw-bold text-dark text-capitalize">Usuario</div>
                    <small id="companyName" class="text-muted text-uppercase" style="font-size: 0.7rem;">Mi Empresa</small>
                </div>
                <i class="bi bi-person-circle fs-3 text-primary cursor-pointer"></i>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <div class="row mb-4 align-items-center">
            <div class="col-md-3"><h2 class="fw-bold m-0">Productos</h2></div>
            <div class="col-md-3">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscador" class="form-control border-start-0" placeholder="Buscar..." onkeyup="filtrarProductos()">
                </div>
            </div>
            <div class="col-md-2">
                <select id="filtroCategoria" class="form-select shadow-sm" onchange="filtrarProductos()">
                    <option value="">Categorías</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary shadow-sm w-100" onclick="abrirPapelera()">
                    <i class="bi bi-trash3 me-2"></i>Papelera
                </button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary shadow-sm w-100" onclick="prepararFormulario()">
                    <i class="bi bi-plus-lg me-2"></i>Nuevo
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Detalle</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="listaProductos">
                        <tr><td colspan="5" class="text-center p-4">Cargando productos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Producto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formProducto">
                        <input type="hidden" id="prodId">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nombre</label>
                            <input type="text" id="prodNombre" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold">Código de Barras</label>
                                <input type="text" id="prodBarcode" class="form-control">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold">Categoría</label>
                                <div class="input-group">
                                    <select id="prodCategoria" class="form-select" required></select>
                                    <button class="btn btn-outline-primary" type="button" onclick="abrirModalCategoria()">+</button>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold">Costo</label>
                                <input type="number" step="0.01" id="prodCosto" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold">Precio Venta</label>
                                <input type="number" step="0.01" id="prodPrecio" class="form-control" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold">Stock Actual</label>
                                <input type="number" id="prodStock" class="form-control" value="0">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold">Stock Mínimo</label>
                                <input type="number" id="prodMinStock" class="form-control" value="5">
                            </div>
                        </div>
                        <div class="text-end mt-3">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary px-4">Guardar Producto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCategoria" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title small fw-bold">Nueva Categoría</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre</label>
                        <input type="text" id="newCatNombre" class="form-control" placeholder="Ej: Lácteos">
                    </div>
                    <button class="btn btn-dark w-100" onclick="guardarCategoria()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPapelera" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-secondary text-white">
                    <h5 class="modal-title fw-bold">Papelera de Reciclaje</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light"><tr><th class="ps-3">Producto</th><th class="text-end pe-3">Acción</th></tr></thead>
                        <tbody id="listaBorrados"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="productos.js"></script>
</body>
</html>
