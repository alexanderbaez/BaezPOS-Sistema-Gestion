<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BaezPOS - Gastos de Caja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 250px; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }

        #sidebar {
            width: var(--sidebar-width);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            background-color: #212529;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            width: calc(100% - var(--sidebar-width));
        }

        .hover-menu {
            border-left: 4px solid transparent;
            transition: 0.2s;
        }

        .hover-menu:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #0d6efd !important;
        }

        .nav-link.active-page {
            background-color: #0d6efd;
            font-weight: bold;
            color: white !important;
        }

        .card { border-radius: 12px; border: none; }
        .table thead th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; }
    </style>
</head>
<body>

<nav id="sidebar" class="bg-dark vh-100 shadow">
    <div class="p-4 text-center">
        <h3 class="text-white fw-bold">BaezPOS</h3>
        <hr class="text-white">
    </div>
    <div class="nav flex-column px-3 gap-1">
        <a href="dashboard.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>
        <a href="productos.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-box-seam me-2"></i> Productos
        </a>
        <a href="ventas.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-cart me-2"></i> Punto de Venta
        </a>
        <a href="clientes.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-people me-2"></i> Clientes (Libreta)
        </a>
        <a href="historial.html" class="nav-link text-white rounded p-2">
            <i class="bi bi-people me-2"></i> Historial de Ventas
        </a>
        <a href="perfil.html" class="nav-link text-white rounded p-2 active">
            <i class="bi bi-shop me-2"></i> Mi Negocio
        </a>
        <a href="#" class="nav-link text-danger mt-5 p-2" onclick="cerrarSesion()">
            <i class="bi bi-box-arrow-left me-2"></i> Salir
        </a>
    </div>
</nav>

<div class="main-content">
    <div class="row mb-4 align-items-center">
        <div class="col-md-7">
            <h2 class="fw-bold text-dark mb-0"><i class="bi bi-dash-circle text-danger"></i> Registro de Gastos</h2>
            <p class="text-muted small">Anotá cualquier salida de dinero de la caja diaria (Proveedores, servicios, etc).</p>
        </div>
        <div class="col-md-5 text-end">
            <button class="btn btn-danger shadow-sm px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#modalNuevoGasto">
                <i class="bi bi-plus-lg me-1"></i> REGISTRAR NUEVO GASTO
            </button>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive" style="min-height: 400px;">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                    <tr>
                        <th class="ps-4">FECHA</th>
                        <th>DESCRIPCIÓN</th>
                        <th>CATEGORÍA</th>
                        <th class="text-end pe-4">MONTO</th>
                    </tr>
                    </thead>
                    <tbody id="listaGastos" style="font-size: 14px;">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNuevoGasto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title fw-bold">Nuevo Gasto de Caja</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="formGasto">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Descripción del gasto</label>
                        <input type="text" id="descGasto" class="form-control form-control-lg" placeholder="Ej: Pago de flete, Factura de Luz..." required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Monto ($)</label>
                            <input type="number" id="montoGasto" class="form-control form-control-lg" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Categoría</label>
                            <select id="catGasto" class="form-select form-select-lg">
                                <option value="GENERAL">General</option>
                                <option value="PROVEEDOR">Pago a Proveedor</option>
                                <option value="SERVICIOS">Servicios (Luz, Agua)</option>
                                <option value="SUELDOS">Sueldos / Adelantos</option>
                                <option value="MANTENIMIENTO">Mantenimiento</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger px-4 fw-bold">GUARDAR GASTO</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="gastos.js"></script>
</body>
</html>
