<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaezPOS - Clientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --sidebar-width: 250px;
      --primary-color: #1e3a8a;
      --primary-blue: #0d6efd;
    }
    body {
      background-color: #f1f5f9;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    #content {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      padding: 2rem;
      transition: all 0.3s;
    }

    .stat-card { border: none; border-radius: 15px; border-start-width: 4px !important; }
    .table-card { border-radius: 20px; background: white; border: none; }

    .balance-badge {
      padding: 0.35rem 0.65rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .btn-action {
      border: none;
      background: #f8fafc;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-action:hover {
      background: #e2e8f0;
    }

    /* Previene scrollbars incómodos en modales de SweetAlert2 */
    .swal2-popup {
      overflow-x: hidden !important;
      border-radius: 20px !important;
    }
    .swal2-html-container {
      overflow-x: hidden !important;
      margin: 1em 1.6em 0.3em !important;
    }

    /* Modal Historial y Scroll de Tabla */
    #modalHistorialCliente .modal-body {
      max-height: 65vh;
      overflow-y: auto;
    }

    #modalHistorialCliente table thead th {
      position: sticky;
      top: 0;
      background-color: #f8fafc;
      z-index: 10;
      box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.08);
    }

    .border-dashed {
      border-style: dashed !important;
    }

    @media (max-width: 768px) {
        #sidebar { left: calc(var(--sidebar-width) * -1) !important; }
        #content { margin-left: 0; width: 100%; }
        #sidebar.active { left: 0 !important; }
    }

    .nav-link.active-page { background-color: var(--primary-blue) !important; font-weight: bold; color: white !important; }
  </style>
</head>
<body>

<div id="sidebar-container"></div>

<div id="content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold m-0 text-dark">Gestión de Clientes</h2>
      <p class="text-muted small mb-0">Administra cuentas corrientes y deudas de clientes.</p>
    </div>
    <button class="btn btn-primary shadow-sm px-4 fw-bold" onclick="abrirModalNuevoCliente()">
      <i class="bi bi-person-plus-fill me-2"></i> Nuevo Cliente
    </button>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="card stat-card shadow-sm p-3 border-0 border-start border-danger border-4">
        <div class="d-flex align-items-center">
          <div class="icon-box bg-danger bg-opacity-10 text-danger me-3 p-3 rounded-3"><i class="bi bi-person-exclamation fs-4"></i></div>
          <div>
            <small class="text-muted fw-bold">DEUDA TOTAL EN LA CALLE</small>
            <h4 class="mb-0 fw-bold" id="totalDeudaClientes">$0,00</h4>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm mb-4" style="border-radius: 15px;">
    <div class="card-body p-3 d-flex align-items-center justify-content-between">
      <div class="input-group flex-grow-1 me-3">
        <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
        <input type="text" id="buscarCliente" class="form-control border-0 shadow-none" placeholder="Buscar por nombre o DNI..." onkeyup="filtrarClientes()">
      </div>
      <div class="form-check form-switch m-0">
        <input class="form-check-input" type="checkbox" role="switch" id="filtroDeudores" onchange="filtrarClientes()">
        <label class="form-check-label small fw-bold text-danger" for="filtroDeudores">SOLO DEUDORES</label>
      </div>
    </div>
  </div>

  <div class="card table-card shadow-sm p-4">
    <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-list-ul me-2 text-primary"></i>Lista de Clientes</h5>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
        <tr class="text-muted small text-uppercase">
          <th class="border-0">Nombre</th>
          <th class="border-0">DNI/CUIT</th>
          <th class="border-0">WhatsApp</th>
          <th class="border-0">Saldo</th>
          <th class="border-0 text-end pe-4">Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaClientes"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Nuevo / Editar Cliente -->
<div class="modal fade" id="modalNuevoCliente" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
      <div class="modal-header border-0 p-4">
        <h5 class="fw-bold m-0" id="modalClienteTitulo">Nuevo Cliente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4 pt-0">
        <form id="formNuevoCliente" onsubmit="event.preventDefault(); guardarCliente();">
          <input type="hidden" id="custId">
          <div class="mb-3">
            <label class="small fw-bold text-muted mb-1">Nombre Completo *</label>
            <input type="text" id="custNombre" class="form-control bg-light border-0 p-2" required>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="small fw-bold text-muted mb-1">DNI/CUIT</label>
              <input type="text" id="custDni" class="form-control bg-light border-0 p-2">
            </div>
            <div class="col-md-6 mb-3">
              <label class="small fw-bold text-muted mb-1">Teléfono</label>
              <input type="text" id="custTel" class="form-control bg-light border-0 p-2" placeholder="Ej: 2641234567">
            </div>
          </div>
          <div class="mb-2">
            <label class="small fw-bold text-muted mb-1">Límite de Crédito ($)</label>
            <input type="number" id="custLimite" class="form-control bg-light border-0 p-2 fw-bold text-primary" value="10000">
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 p-4 pt-0">
        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary px-4" onclick="guardarCliente()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Historial Libreta -->
<div class="modal fade" id="modalHistorialCliente" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg overflow-hidden" style="border-radius: 20px;">

      <!-- Cabecera del Modal -->
      <div class="modal-header bg-dark text-white p-4 d-flex justify-content-between align-items-center">
        <div>
          <h5 class="fw-bold m-0" id="historialTitulo">Libreta de Cliente</h5>
          <small class="text-white-50" id="historialSubtitulo"></small>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <!-- Barra de Filtros por Rango de Fechas -->
      <div class="bg-light border-bottom p-3">
        <div class="row g-2 align-items-center">
          <div class="col-md-4 col-6">
            <label class="small fw-bold text-muted d-block mb-1">Desde:</label>
            <input type="date" id="filtroFechaDesde" class="form-control form-control-sm border shadow-none" onchange="aplicarFiltroFechas()">
          </div>
          <div class="col-md-4 col-6">
            <label class="small fw-bold text-muted d-block mb-1">Hasta:</label>
            <input type="date" id="filtroFechaHasta" class="form-control form-control-sm border shadow-none" onchange="aplicarFiltroFechas()">
          </div>
          <div class="col-md-4 col-12 d-flex gap-2 align-items-end pt-md-3">
            <button class="btn btn-sm btn-outline-primary w-100 fw-bold" onclick="limpiarFiltroFechas()">
              <i class="bi bi-calendar-check me-1"></i> Ver Todo
            </button>
          </div>
        </div>
      </div>

      <!-- Tabla de Movimientos -->
      <div class="modal-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-light small text-uppercase">
            <tr>
              <th class="ps-4">Fecha</th>
              <th>Concepto / Productos</th>
              <th class="text-end">Debe (+)</th>
              <th class="text-end">Haber (-)</th>
              <th class="pe-4 text-end">Saldo</th>
            </tr>
            </thead>
            <tbody id="listaMovimientos" class="small"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="sidebar.js"></script>
<script src="auth.js"></script>
<script src="clientes.js"></script>
</body>
</html>
